<div style="font-family: -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 24px;">
  <h2 style="color: #111118; font-size: 22px;">Your password was changed</h2>
  <p style="color: #555; font-size: 14px; line-height: 1.6;">
    Hi {{ user.first_name|default:user.username }},<br><br>
    This is a confirmation that the password for your {{ site_name }} account was just changed.
    If this was you, no action is needed.
  </p>
  <p style="color: #b91c1c; font-size: 13px; background:#fef2f2; border-radius:8px; padding:12px 16px; margin-top:16px;">
    If you didn't make this change, please reset your password immediately and contact support.
  </p>
</div>
