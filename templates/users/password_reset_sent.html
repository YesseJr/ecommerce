{% extends 'base.html' %}

{% block title %}Check Your Email — BookMyStay{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-20 px-4"
     style="background: linear-gradient(135deg, #1B3A6B 0%, #0F2347 100%)">

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10 text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-50 mb-5">
      <i data-lucide="mail-check" class="w-7 h-7 text-emerald-500"></i>
    </div>
    <h1 class="font-display text-3xl font-bold text-dark mb-3">Check Your Email</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-8">
      If an account exists with that email, we've sent a link to reset your password.
      It expires in a few hours, so use it soon.
    </p>
    <a href="{% url 'users:login' %}"
       class="inline-block bg-accent text-white px-6 py-3 rounded-full font-semibold text-sm hover:shadow-lg transition">
      Back to Sign In
    </a>
  </div>
</div>
{% endblock %}
