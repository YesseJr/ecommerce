{% extends 'base.html' %}

{% block title %}Sign In : BookmyStay{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-20 px-4"
     style="background: linear-gradient(135deg, #1B3A6B 0%, #0F2347 100%)">

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">

    <div class="text-center mb-8">
      <h1 class="font-display text-4xl font-bold text-dark mb-2">Welcome Back</h1>
      <p class="text-gray-500 text-sm">
        Don't have an account?
        <a href="{% url 'users:register' %}" class="text-accent font-semibold hover:underline">Sign up free</a>
      </p>
    </div>

    <form method="POST" class="flex flex-col gap-4">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit"
        class="w-full bg-accent text-white py-3.5 rounded-2xl font-semibold text-base hover:shadow-xl hover:-translate-y-0.5 transition-all mt-2">
        Sign In 👋
      </button>
    </form>
  </div>
</div>

<style>
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 2px solid #E5E7EB;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #F97316; }
</style>
{% endblock %}
