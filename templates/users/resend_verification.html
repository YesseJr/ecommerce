{% extends 'base.html' %}

{% block title %}Resend Verification — BookMyStay{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-20 px-4"
     style="background: linear-gradient(135deg, #1B3A6B 0%, #0F2347 100%)">

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-accent/10 mb-4">
        <i data-lucide="mail-plus" class="w-6 h-6 text-accent"></i>
      </div>
      <h1 class="font-display text-3xl font-bold text-dark mb-2">Resend Verification</h1>
      <p class="text-gray-500 text-sm">
        Enter your email and we'll send a fresh verification link.
      </p>
    </div>

    <form method="POST" class="flex flex-col gap-4">
      {% csrf_token %}
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Email</label>
        <input type="email" name="email" required value="{{ prefill_email }}"
               class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-xl outline-none focus:border-accent transition text-sm"/>
      </div>

      <button type="submit"
        class="w-full bg-accent text-white py-3.5 rounded-2xl font-semibold text-base hover:shadow-xl hover:-translate-y-0.5 transition-all mt-2">
        Send Verification Link
      </button>

      <a href="{% url 'users:login' %}" class="text-center text-sm text-gray-400 hover:text-accent transition mt-1">
        ← Back to Sign In
      </a>
    </form>
  </div>
</div>
{% endblock %}
